<div class="attendance-form-container">
  <h2>{{ isEditMode ? 'Edit Attendance' : 'Mark Attendance' }}</h2>

  <form (ngSubmit)="onSubmit()" #attendanceForm="ngForm" class="attendance-form">

    <div class="form-group">
      <label for="employee">Employee</label>
      <select
        id="employee"
        name="employee"
        [(ngModel)]="selectedEmployeeId"
        required
      >
        <option [ngValue]="null" disabled>-- Select Employee --</option>
        <option *ngFor="let emp of employees" [ngValue]="emp.id">{{ emp.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input
        type="date"
        id="date"
        name="date"
        [(ngModel)]="attendance.date"
        required
      />
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select
        id="status"
        name="status"
        [(ngModel)]="attendance.status"
        required
      >
        <option value="present">Present</option>
        <option value="absent">Absent</option>
        <option value="half_day">Half Day</option>
        <option value="on_leave">On Leave</option>
      </select>
    </div>

    <button type="submit" [disabled]="!attendanceForm.valid">
      {{ isEditMode ? 'Update Attendance' : 'Mark Attendance' }}
    </button>

  </form>
</div>
