
<div class="estimate-form-container">
  <h2>{{ isEditMode ? 'Edit Estimate' : 'Add New Estimate' }}</h2>

  <form (ngSubmit)="onSubmit()" #estimateForm="ngForm" class="estimate-form">

    <div class="form-group">
      <label for="estimateNumber">Estimate Number</label>
      <input
        type="text"
        id="estimateNumber"
        name="estimateNumber"
        [(ngModel)]="estimate.estimateNumber"
        placeholder="e.g. EST-2026-001"
        required
      />
    </div>

    <div class="form-group">
      <label for="client">Client</label>
      <select
        id="client"
        name="client"
        [(ngModel)]="selectedClientId"
        required
      >
        <option [ngValue]="null" disabled>-- Select Client --</option>
        <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="estimateDate">Estimate Date</label>
      <input
        type="date"
        id="estimateDate"
        name="estimateDate"
        [(ngModel)]="estimate.estimateDate"
        required
      />
    </div>

    <div class="form-group">
      <label for="amount">Amount (₹)</label>
      <input
        type="number"
        id="amount"
        name="amount"
        [(ngModel)]="estimate.amount"
        placeholder="0.00"
        required
      />
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select
        id="status"
        name="status"
        [(ngModel)]="estimate.status"
        required
      >
        <option value="draft">Draft</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>

    <button type="submit" [disabled]="!estimateForm.valid">
      {{ isEditMode ? 'Update Estimate' : 'Add Estimate' }}
    </button>

  </form>
</div>
