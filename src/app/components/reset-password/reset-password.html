<div class="auth-container">
  <h2>Reset Password</h2>

  <p class="error" *ngIf="tokenMissing">
    Invalid reset link. Please request a new one from the
    <a routerLink="/forgot-password">forgot password</a> page.
  </p>

  <form (ngSubmit)="onSubmit()" *ngIf="!tokenMissing && !message">
    <div>
      <label>New Password</label>
      <input type="password" name="newPassword" [(ngModel)]="newPassword" required />
    </div>

    <div>
      <label>Confirm Password</label>
      <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required />
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Resetting...' : 'Reset Password' }}
    </button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>

  <p class="success" *ngIf="message">{{ message }} Redirecting to login...</p>
</div>
