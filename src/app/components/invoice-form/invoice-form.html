<div class="invoice-form-container">
  <h2>{{ isEditMode ? 'Edit Invoice' : 'Add New Invoice' }}</h2>

  <form (ngSubmit)="onSubmit()" #invoiceForm="ngForm" class="invoice-form">

    <div class="form-group">
      <label for="invoiceNumber">Invoice Number</label>
      <input
        type="text"
        id="invoiceNumber"
        name="invoiceNumber"
        [(ngModel)]="invoice.invoiceNumber"
        placeholder="e.g. INV-2026-001"
        required
      />
    </div>

    <div class="form-group">
      <label for="client">Client</label>
      <select
        id="client"
        name="client"
        [(ngModel)]="selectedClientId"
        required
      >
        <option [ngValue]="null" disabled>-- Select Client --</option>
        <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="invoiceDate">Invoice Date</label>
        <input
          type="date"
          id="invoiceDate"
          name="invoiceDate"
          [(ngModel)]="invoice.invoiceDate"
          required
        />
      </div>

      <div class="form-group">
        <label for="dueDate">Due Date</label>
        <input
          type="date"
          id="dueDate"
          name="dueDate"
          [(ngModel)]="invoice.dueDate"
          required
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="subTotal">Sub Total (₹)</label>
        <input
          type="number"
          id="subTotal"
          name="subTotal"
          [(ngModel)]="invoice.subTotal"
          (input)="calculateGst()"
          placeholder="0.00"
          required
        />
      </div>

      <div class="form-group">
        <label for="gstPercentage">GST (%)</label>
        <input
          type="number"
          id="gstPercentage"
          name="gstPercentage"
          [(ngModel)]="invoice.gstPercentage"
          (input)="calculateGst()"
          placeholder="e.g. 18"
          required
        />
      </div>
    </div>

    <div class="calculated-summary">
      <div class="summary-row">
        <span>GST Amount</span>
        <span>₹{{ invoice.gstAmount }}</span>
      </div>
      <div class="summary-row total">
        <span>Total Amount</span>
        <span>₹{{ invoice.totalAmount }}</span>
      </div>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select
        id="status"
        name="status"
        [(ngModel)]="invoice.status"
        required
      >
        <option value="draft">Draft</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
      </select>
    </div>

    <button type="submit" [disabled]="!invoiceForm.valid">
      {{ isEditMode ? 'Update Invoice' : 'Add Invoice' }}
    </button>

  </form>
</div>
